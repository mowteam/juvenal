name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Only publish on push to main, not on PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(python3 -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          PREVIOUS=$(git show ${{ github.event.before }}:pyproject.toml 2>/dev/null | python3 -c "
          import tomllib, sys
          print(tomllib.load(sys.stdin.buffer)['project']['version'])
          " 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          if [ -n "$PREVIOUS" ] && [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT)"
          fi

      - name: Set up Python
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        if: steps.version.outputs.changed == 'true'
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.version.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

  version-check:
    runs-on: ubuntu-latest
    # On PRs, just report whether the version changed
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version change in PR
        run: |
          CURRENT=$(python3 -c "
          import tomllib
          print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])
          ")
          BASE=$(git show origin/${{ github.base_ref }}:pyproject.toml 2>/dev/null | python3 -c "
          import tomllib, sys
          print(tomllib.load(sys.stdin.buffer)['project']['version'])
          " 2>/dev/null || echo "")
          if [ -n "$BASE" ] && [ "$CURRENT" != "$BASE" ]; then
            echo "::notice::Version bump detected: $BASE -> $CURRENT. A PyPI release will be published on merge."
          else
            echo "No version change detected ($CURRENT)."
          fi
