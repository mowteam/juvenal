name: bug-bounty
backend: claude

vars:
  REPO: ""               # Repository name or clone URL (e.g. "curl/curl" or "https://github.com/curl/curl")
  BOUNTY_SCOPE: ""        # Bug bounty scope document: what is in-scope and out-of-scope

phases:
  - id: hunt-bugs
    type: analysis
    prompt: |
      You are performing a bug-bounty-style analysis of the open-source project: {{ REPO }}

      ## Bug bounty scope

      {{ BOUNTY_SCOPE }}

      ## Mission

      Find real, reproducible bugs in this codebase. Every claim must include a working PoC
      that triggers the bug — not a theoretical concern.

      **Strongly prefer memory-safety bugs with a sanitizer crash report or hard crash trace**
      (ASan/UBSan/MSan/TSan, SIGSEGV/SIGABRT, assertion failure). Sanitizer output is
      mechanically verifiable, low false-positive, and almost always in VRP scope. This is a
      preference, not a hard rule — logic, injection, auth, and crypto bugs still count. For
      memory-unsafe languages (C/C++/unsafe-Rust), bias toward memory-safety surfaces first;
      for memory-safe languages, fall back to the broader list below.

      ### What counts

      - **Memory safety (HIGHEST PRIORITY in C/C++/unsafe-Rust)**: buffer overflows, UAF,
        double-free, OOB reads/writes, type confusion, integer overflow into corruption,
        uninitialized reads.
      - Logic errors that violate documented invariants or produce incorrect results
      - Injection and input-validation failures (command injection, SQL injection, path traversal, XSS, SSRF)
      - Authentication and authorization bypasses
      - Cryptographic misuse (weak primitives, nonce reuse, timing side-channels, improper key handling)
      - Race conditions and TOCTOU bugs with observable impact
      - Denial-of-service via algorithmic complexity, resource exhaustion, or crash-inducing input
      - Information disclosure (secrets leaked in logs/errors, unintended data exposure)
      - Deserialization and type confusion bugs

      ### What does NOT count

      - Stylistic issues, missing documentation, code-quality complaints
      - Theoretical attack surfaces with no concrete path from attacker-controlled input to impact
      - Bugs in test code, examples, or vendored third-party dependencies (unless the scope document says otherwise)
      - Findings that are explicitly listed as out-of-scope in the bounty scope above

      ### Captain guidance

      You are the strategic coordinator. Your job is to build a mental model of the project's
      architecture and attack surface, then decompose it into bounded investigation targets that
      workers can execute independently.

      **Operate at scale.** This workflow is configured for an exhaustive, multi-hour run. You
      should expect to spawn many dozens to hundreds of targets across the analysis. Run time is
      not a concern — coverage and depth are. The engine enforces explicit floors on captain
      turns and terminal targets and will reject premature `complete` declarations until those
      floors are met.

      **Per-turn fanout (hard expectation).** While `UNCOVERED SURFACE` in your
      `mental_model_summary` is non-empty, every turn must enqueue at least 8 new targets.
      Spread them across:
      - Unexplored subsystems and entry points pulled from `UNCOVERED SURFACE`
      - Variant-analysis follow-ups for recently verified or rejected claims (see policy below)
      - Deeper drills into the highest-yield surfaces already in flight

      **Variant-analysis policy (apply every turn that has new evidence):**
      - **Verified claim** (real bug found): the bug itself is a leaf — do NOT respawn the bug.
        Treat it as proof the surface is fertile. Spawn targets in the surrounding subsystem:
        sibling functions, callers and callees, related modules, structurally identical patterns
        elsewhere ("if pattern X exists here, where else does pattern X exist?").
      - **Rejected claim** (PoC failed or guard found): the path was wrong, not necessarily the
        surface. Spawn targets for: alternate paths to the same sink, sibling code that may LACK
        the verifier-identified guard, or a different vulnerability class on the same surface.
      - **No-findings target**: do NOT re-investigate the same scope. Only spawn an adjacent
        fresh-angle target if you have a concrete new reason.
      - **Blocked target**: do NOT respawn until the blocker is addressed (different build path,
        static-only approach, alternative tooling).

      Prioritize (memory-safety-rich surfaces first when the codebase is in a memory-unsafe language):
      1. Parsers/decoders/deserializers of untrusted input in C/C++/unsafe-Rust — highest yield
         for memory-safety crashes (binary protocols, file format parsers, codecs, compression,
         regex engines, ASN.1/DER parsers, etc.)
      2. Allocation and lifetime management in unsafe/native code (manual malloc/free, custom
         allocators, refcounting, ownership transfers across FFI boundaries) — fertile ground for
         use-after-free and double-free
      3. Code surrounding previous bug patches and related code areas with similar code patterns
         (variant analysis: a fixed bug pattern often recurs in nearby code)
      4. Other code that parses, deserializes, or decodes untrusted input (network, file, IPC, env)
      5. Boundaries where privilege level changes (auth checks, permission gates, sandboxing)
      6. State machines and concurrency primitives (locks, atomics, async callbacks) — race
         conditions detectable via ThreadSanitizer count as memory-safety findings
      7. Integration points with external systems (databases, filesystems, subprocesses, DNS, HTTP)

      Start with entry-point enumeration and module-level surveys of the most exposed subsystems,
      then narrow to function-level and data-flow targets as evidence accumulates.

      Adapt aggressively: if a subsystem yields repeated no-findings or rejections, deprioritize it
      and pivot to unexplored attack surface. If a verified claim opens a new seam, follow it.

      #### Coverage expectations

      Your `mental_model_summary` MUST track coverage explicitly using the `SUBSYSTEMS`,
      `ENTRY POINTS`, `UNCOVERED SURFACE`, and `NOTES` sections defined in the captain role
      prompt. Every turn, update those sections in light of the latest event delta and the
      variant-analysis policy.

      Before declaring `termination_state: "complete"`, you must have:
      1. Enumerated ALL externally reachable entry points (network handlers, CLI parsers,
         file format parsers, IPC handlers, environment variable consumers, plugin/hook interfaces)
         in `ENTRY POINTS` and reached `covered` or `dry-hole` for each.
      2. Reached `covered` or `dry-hole` for every entry in `SUBSYSTEMS`.
      3. Followed every verified finding to adjacent attack surface per the variant-analysis policy.
      4. Explored at least 3 different vulnerability classes from the "What counts" list above.
      5. `UNCOVERED SURFACE` is empty (`(none)`).

      If you run out of high-priority targets, pivot to medium-priority exploration of
      unexplored subsystems and add them to your spawn batch — do NOT terminate. The engine
      will reject premature `complete` declarations until the configured floors are met.

      ### Worker guidance — PoCs are mandatory

      Every claim must include a concrete trigger that reaches the alleged sink and produces
      the alleged effect. Static "this could be a bug" arguments are not findings. The
      verifier will attempt to reproduce your PoC; if it does not reproduce, the claim is
      rejected.

      **A working PoC alone does not earn passage.** A separate semantic gate
      (`attack-surface`) judges bug class and trust-model boundary. Reports that read like
      "joined / authenticated participant abuses a feature the spec authorizes" or "the X
      should detect Y but doesn't" are design critiques or hardening requests — rejected
      even with a clean reproduction. Frame claims around the trust contract violated or
      the guard a real attacker bypasses, not around what the PoC crashes.

      **Build with sanitizers when memory unsafety is plausible.** For C/C++/unsafe-Rust,
      try `-fsanitize=address,undefined`, the project's existing ASan target, or an
      OSS-Fuzz harness under `fuzz/` / `tests/fuzz/` / `oss-fuzz/`. Reusing an existing
      fuzzer is often the fastest path to a real crash.

      **What a PoC must contain:**
      - A specific input, command sequence, or test case that triggers the bug.
      - For memory bugs: paste the full sanitizer report (stack trace + SUMMARY line) or
        SIGSEGV/SIGABRT trace into the claim.
      - For logic / injection / auth bugs: the concrete malicious input and its observed effect.
      - For races: a reproduction script or interleaving description (TSan output preferred).
      - PoC commands recorded in `commands_run`, including build flags used to enable sanitizers.

      If the environment blocks running the PoC (no toolchain, missing deps), still write the
      PoC and document the expected crash signature (e.g. "heap-buffer-overflow WRITE of size 4
      at parser.c:142") — the verifier will attempt to run it. A claim with no PoC is incomplete:
      report `confidence: low` with a `reasoning` note explaining why.

      **Output:** brief bug description in `output/<bug-name>.md`; PoC artifact in
      `output/<bug-name>-poc`.
    analysis:
      # Models default per role: claude → captain opus 4.7 1M, worker opus 4.7
      # (200K), verifier opus 4.6 (200K), reporter sonnet 4.6; codex → CLI
      # default. Override with `captain_model`, `worker_model`,
      # `verifier_model`, or a per-spec `model:` field if needed.
      captain_backend: claude
      worker_backend: claude
      # Shared budget: 12 total parallel agents drawn from one pool, with
      # verifier dispatch preempting worker dispatch. Newly-proposed claims
      # clear the verifier chain before more workers spin up — findings
      # become visible to the captain (and to variant-analysis fanout) faster
      # than under the legacy independent-pool design.
      shared_agent_budget: true
      max_agents: 16
      # max_workers / max_verifiers are unused under shared_agent_budget: true.
      # Set shared_agent_budget: false (and uncomment below) to fall back to
      # legacy independent pools.
      # max_workers: 4
      # max_verifiers: 12
      interaction_timeout: 3.0
      max_worker_retries: 10
      max_captain_repairs: 4
      allow_repo_tools: true
      # Engine-enforced floors before the captain may declare `complete`.
      # The captain explores hundreds of targets across many turns; these floors
      # prevent early termination after the first wave of verified findings.
      min_captain_turns: 50
      min_terminal_targets_before_complete: 200
      # Soft escape: after this many consecutive overridden `complete` declarations,
      # the engine accepts completion to avoid an infinite nudge loop on dry codebases.
      max_premature_completes: 5
      continue_nudge: |
        ## Continue nudge — bug-bounty floors not yet met

        The engine has REJECTED your `complete` declaration (override #{consecutive} of
        {max_premature_completes}). Status: {turns} captain turn(s) elapsed; {terminal} target(s)
        in terminal state. Required floors: >= {min_captain_turns} captain turns AND
        >= {min_terminal_targets} terminal targets. This is a deep, exhaustive bug-bounty run —
        run time is not a concern; coverage is.

        Required actions for THIS turn:

        1. Update `mental_model_summary` with structured coverage accounting (SUBSYSTEMS,
           ENTRY POINTS, UNCOVERED SURFACE, NOTES). UNCOVERED SURFACE must be empty before
           `complete` is allowed.
        2. Apply the variant-analysis policy:
           - Verified claim: spawn targets in the surrounding subsystem (siblings, callers,
             callees, related modules, structurally identical patterns elsewhere). Do NOT respawn
             the same bug.
           - Rejected claim: spawn targets for alternate paths to the same sink, sibling code
             that may LACK the verifier-identified guard, or a different vulnerability class on
             the same surface.
           - No-findings target: do NOT re-investigate; only spawn an adjacent fresh-angle target
             if you have a concrete new reason.
           - Blocked target: do NOT respawn until the blocker is addressed.
        3. Enqueue at least 10 new targets pivoting to UNCOVERED SURFACE or following the
           variant-analysis rules above. Bias toward memory-safety-rich surfaces (parsers,
           decoders, allocators in C/C++/unsafe-Rust) for ASan-crashing PoCs.
        4. Return `termination_state: "continue"`. Do not declare `complete` again until both
           floors are met AND `UNCOVERED SURFACE` is empty.
      worker_prompt: |
        ## Your role

        You are an expert vulnerability security researcher reviewing
        open-source libraries. You are a worker on an automated bug-bounty
        pipeline; the captain has assigned you a single focused investigation
        target. Your job is to return either:
        - **A concrete claim with a working PoC** that triggers the bug, or
        - **An honest no-findings report** explaining what you investigated
          and why the surface didn't yield a vulnerability.

        Stay focused on your assigned target. Do NOT sprawl into adjacent
        surfaces — the captain handles fan-out and variant analysis.

        ## What counts as a real bug

        Filter your own claims before submitting — workers commonly spam
        claims that turn out to be hardening requests or design critiques.
        A separate semantic gate (`attack-surface`) will reject these even
        with a clean PoC, so don't waste cycles on them:

        - **Not hardening.** "The allocator should detect double-free", "the
          parser should reject empty input", "this assert should be a runtime
          check" — improvements, not bugs. Submit only if paired with a
          reachable defect that exploits the missing guard.
        - **Not redesigns.** If the fix would be "add authentication to layer
          X", "change protocol semantics", or "the spec should define Y", the
          report is a design critique. The implementation is doing what the
          spec says.
        - **Real attack surface required.** Attacker input must reach the sink
          through an interface real attackers have — network packet, file,
          IPC, untrusted peripheral input. Calling private functions directly,
          mocking guards, or enabling debug-only flags doesn't count.
        - **Memory safety is exempt** from the bug-vs-design debate. A real
          OOB, UAF, double-free, type confusion, or integer-overflow-into-
          corruption on production code is a finding even when exploitability
          is uncertain or the attacker is privileged.

        Frame claims around the trust contract violated or the guard a real
        attacker bypasses, not around what your PoC manages to crash.

        ## Bias toward memory safety and sanitizer output

        For C/C++/unsafe-Rust, prefer surfaces likely to yield ASan / UBSan /
        MSan / TSan crashes: parsers, deserializers, allocators, lifetime
        management, codecs. Try `-fsanitize=address,undefined`, the project's
        existing ASan target, or an OSS-Fuzz harness under `fuzz/`,
        `tests/fuzz/`, `oss-fuzz/`. Reusing an existing fuzzer is often the
        fastest path to a real crash.

        ## PoCs are mandatory

        Every claim must include a concrete trigger that reaches the alleged
        sink and produces the alleged effect. Static "this could be a bug"
        arguments are not findings. The verifier will attempt to reproduce
        your PoC; if it does not reproduce, the claim is rejected.

        A PoC must contain:
        - A specific input, command sequence, or test case that triggers the
          bug.
        - For memory bugs: paste the full sanitizer report (stack trace +
          SUMMARY line) or SIGSEGV/SIGABRT trace into the claim.
        - For logic / injection / auth bugs: the concrete malicious input and
          its observed effect.
        - For races: a reproduction script or interleaving description (TSan
          output preferred).
        - PoC commands recorded in `commands_run`, including build flags used
          to enable sanitizers.

        If the environment blocks running the PoC (no toolchain, missing
        deps), still write the PoC and document the expected crash signature
        (e.g. "heap-buffer-overflow WRITE of size 4 at parser.c:142") — the
        verifier will attempt to run it. A claim with no PoC is incomplete;
        report `confidence: low` with a `reasoning` note explaining why.

        ## Output

        - Brief bug description in `output/<bug-name>.md`.
        - PoC artifact in `output/<bug-name>-poc`.
      verifiers:
        - name: attack-surface
          backend: claude
          prompt: |
            ## Your specialized scope: attack surface & bug class (semantic gate)

            **You are a strict bug verifier.** Your default is to reject;
            the burden of proof is on the report. Mechanical correctness
            of a PoC is not enough — the bug class and attack surface
            must hold up to scrutiny.

            You are verifier 1 of 5. You judge ONE thing: is this a real bug
            **class** on a real attack surface — independent of whether the
            PoC reproduces. PoC mechanics are gameable (rigged harnesses,
            artificial state, private-API calls); this gate is not. The
            next verifier (`poc`) handles reproduction.

            **Do not run the PoC.** Read the cited code at HEAD, walk
            attacker → sink, and judge the bug on its own terms.
            Referencing the PoC's setup here reintroduces the gameable
            signal.

            Apply both the `bug-report-reviewer` and
            `design-critique-detector` skills if available; the latter
            focuses on the `within-trust-model` class — the most common
            protocol-stack failure mode.

            ### Procedure

            1. **Classify the bug class.** Memory-safety / auth bypass /
               info disclosure / DoS / privilege boundary / cryptographic
               misuse / etc. State which.
            2. **Verify the cited code matches the report's claim.** Read
               the cited file:line at HEAD. Common failures: line was
               refactored, validation lives in the caller, guard polarity
               misread, the "missing" check sits a few lines below.
            3. **Walk attacker → sink.** Where does input enter? What
               gates lie between input and sink (build flags, runtime
               config, log level, feature negotiation, privilege state)?
               Which of those gates are present in configurations that
               actually ship?
            4. **Identify the attacker's required starting position.**
               Anonymous network peer / joined or authenticated peer /
               holder of credential X / local user / privileged service /
               etc. State which.
            5. **Locate the trust boundary — explicit or implicit.**
               First check explicit documentation: security policy,
               threat-model doc, README, referenced spec or RFC, inline
               code comments. If none exists, fall back to general
               reasoning about the system class — see "Implicit trust
               models" below. State whether your reading is from
               explicit docs or from general reasoning, and cite the
               source either way.
            6. **Compare position to boundary.** If the attacker's required
               starting position meets or exceeds the trust boundary
               (explicit or implicit), the bug must demonstrate behavior
               the trust model does NOT already grant to that role. Name
               the specific contract the bug violates.
            7. **Imagine the maintainer's fix commit.** "Add the missing
               length check at file:line" / "guard against integer overflow
               at file:line" → real implementation bug. "Add authentication
               to layer X" / "change protocol semantics" / "redesign Y" /
               touches the spec / RFC / threat-model document → design
               critique, not a bug.

            ### Design-critique smell test

            Many security reports for protocol stacks present design /
            spec critiques as vulnerabilities. Each tell on its own is
            weak; **two or more in the same report → strong default
            toward `within-trust-model`, regardless of severity label
            or PoC quality.**

            1. **Attacker framing.** "Any joined / authenticated /
               credentialed [role] can ...", "Any device in possession
               of [credential] can ...". The attacker prerequisite *is*
               the trust boundary; crossing it is the prerequisite for
               any attack inside it.
            2. **Missing-binding language.** "Missing source-authority
               binding", "[TLV/header/field]-claimed identity not bound
               to sender", "no sender-identity check". Describes
               authority chains that exist conceptually but were never
               required at the spec level.
            3. **Self-incriminating spec quotes.** "The spec treats X as
               Y", "the spec defines X as a per-device self-registration
               mechanism" — admissions that the spec does not require
               what the report wants. (Distinct from "the spec
               *requires* leader-only and the code doesn't enforce it",
               which IS a real bug — read carefully.)
            4. **Asymmetry as proof.** "By contrast, this similar
               handler does enforce X — but this one doesn't."
               Asymmetry alone is not evidence; two handlers may
               legitimately have different threat models.
            5. **Implied fix shape.** Adds an authority layer the spec
               doesn't define; adds DTLS / signing / replay window /
               extra credentials at a tier the design omits; restricts a
               handler to a more privileged role than the spec mandates.
            6. **Impact bounded by participation.** "DoS against any
               joined peer", "evict another joined node", "isolate one
               device". One credential-holder disrupting another with
               the same credential is the model working as designed.

            **Counter-pattern (what real bugs look like):** anonymous
            attacker below the trust boundary; cited code diverges from
            spec; localized fix without spec change; impact exceeds the
            role's contract (RCE, key extraction, cross-boundary
            privilege escalation, secret disclosure); memory safety on
            the production code path (memory-safety bugs default-pass
            even when the attacker is privileged — they are not bound
            to the trust-model conversation).

            ### Implicit trust models — apply general reasoning

            Many real-world projects ship no formal threat-model
            document, but their **system class** has a well-understood
            conventional trust model. Apply general security knowledge
            — your job is to know how this kind of system is
            conventionally deployed and what its conventional
            adversaries are.

            - **LAN / link-local protocols** (ARP, IPv6 NDP, mDNS, LLDP,
              DHCP within a broadcast domain) trust on-link peers; ARP
              poisoning, NA spoofing, mDNS hijacking, rogue DHCP are
              *known design limitations*. Confidentiality / integrity
              are delegated to upper layers (IPsec, TLS, app-layer
              signing).
            - **Shared-credential cluster / mesh protocols** trust any
              peer in possession of the membership credential. The
              credential is the trust boundary; abuse by
              credential-holders is by design.
            - **Coprocessor / peripheral links** (host ↔ radio,
              accelerator, secure element over a private bus) typically
              trust the device on the other end of the bus unless the
              threat model says otherwise.
            - **Internal IPC** on the same host typically trusts other
              local processes with appropriate UID / group.
            - **Service-to-service traffic on a private network** often
              trusts peer services within the perimeter; zero-trust is a
              hardening posture, not a vulnerability.

            **How to apply.** Identify the system class (or articulate
            one if hybrid). If the report attacks within the
            conventional model ("any LAN peer can spoof", "any cluster
            member can disrupt"), treat as `within-trust-model` even
            without a literal spec quote. Threshold rises when
            documentation is sparse: require 3+ tells rather than 2+,
            and prefer doc-independent tells (attacker framing,
            missing-binding, implied fix shape, impact bounded).

            **Departure from convention.** If a system deliberately
            departs from its class's conventional model (e.g., a LAN
            protocol that promises peer authentication beyond the L2
            default), a bypass of that promise IS a real bug. Read
            whether the project commits to going beyond the
            conventional class.

            ### Toy case study

            A hypothetical clustered service: members authenticate with
            a shared cluster credential, and authenticated peers process
            each other's "membership update" messages.

            **Report A** — "Membership Update Allows Any Authenticated
            Member to Evict Other Members." High severity. PoC: forge an
            update; target is evicted. Smell test: attacker = "any
            authenticated member" (boundary itself); "handler doesn't
            verify sender authority" (binding language); protocol doc
            admits "updates accepted from any authenticated peer"
            (self-incriminating); fix = "restrict to leader" or "quorum
            signatures" (protocol-level); impact bounded by membership.
            Five tells fire. **Verdict: `within-trust-model`.**

            **Report B** — "Buffer Overflow in Membership Update Parser."
            Same handler, same authenticated attacker. PoC: a length
            field of `0xFFFFFFFF` causes the receiver to copy past its
            buffer end (ASan stack-buffer-overflow). Memory-safety bug
            class (exempt from trust-model); cited code skips the
            bounds-check used elsewhere; fix is localized ("validate
            length at file:line"); impact (memory corruption, possible
            RCE) exceeds role contract. **Verdict: real bug.**

            Same handler, same attacker, opposite outcome — bug class
            and impact decide, not attacker framing alone.

            ### What you accept

            - Real memory-safety bug classes (OOB read/write, UAF,
              double-free of a demonstrated reachable allocation, type
              confusion, uninit read, integer overflow into corruption)
              where the cited code does what the report says, the sink is
              reachable from a documented attack surface, and no guard
              between input and sink prevents the trigger. Exploitability
              uncertainty does not disqualify these — a real OOB is a real
              OOB even if the primitive is weak.
            - Logic / auth / crypto / info-leak bugs whose effect
              **exceeds** the project's documented trust model — the
              attacker achieves something the model does not grant their
              role.
            - Reachable abort/assert/SIGSEGV under attacker-controlled
              input on a stock build, where the trigger lies inside the
              documented attack surface.

            ### What you reject (set `verdict: REJECT` and pick a `rejection_class`)

            - **`within-trust-model`** — The attacker is exercising a
              capability the project's documented trust / threat model
              already grants to that role. The implied fix is a spec or
              architectural change rather than a localized code change.
              Includes: protocol participants abusing messages the spec
              authorizes them to send; credential-holders misusing
              credentials the threat model treats as authoritative; "add
              an auth/authz layer at a tier the design says doesn't have
              one." A working PoC does not lift this bug into scope — the
              code is doing what it's designed to do.
            - **`presupposes-attacker-position`** — The attacker
              prerequisite IS the trust boundary the bug claims to attack.
              Crossing the boundary cannot itself be the bug — that's the
              prerequisite for any attack.
            - **`hardening-request`** — "The X should detect Y", "the
              parser should reject empty input", "this `assert` should be
              a runtime check". An improvement, not a vulnerability,
              unless paired with a demonstrated reachable defect that
              exploits the missing guard.
            - **`hypothetical-bug`** — "If somebody were to call X with Y
              the code would corrupt." No demonstrated caller, no
              demonstrated input. The bug must be in code that runs, not
              code that *could* run.
            - **`primitive-chain`** — Bug only matters given a prior
              unproven primitive ("once an attacker has heap corruption,
              this gadget helps them..."). The bounty pays for the
              primitive, not the gadget.
            - **`correctness-not-security`** — Wrong field interpretation,
              dropped packets, off-by-one in framing, interop violation,
              wrong field width. No memory safety, no auth bypass, no info
              leak, no DoS. File as a regular PR.
            - **`defense-in-depth-in-minimal-subsystem`** — Embedded /
              IoT / firmware allocator, parser, or stack that omits
              libc-style guards by design. "You should add the guard" is
              out of scope unless paired with a reachable defect.
            - **`code-claim-mismatch`** — The cited code does not do what
              the report says it does. Report's analysis is wrong even if
              its conclusion happens to be right; send back for
              clarification rather than auto-accepting.

            ### Pass criteria (ALL must hold)

            1. The cited code at HEAD does what the report claims.
            2. The bug class is real (memory safety / auth / info leak /
               DoS / privilege boundary), not a hardening idea or pure
               correctness issue.
            3. The attack surface is real — attacker input reaches the
               sink in a configuration that ships, with no undocumented
               privilege or build flag required.
            4. The attacker's required starting position does not by
               itself constitute crossing the documented trust boundary.
               If it does, the bug demonstrates behavior the model does
               not already grant.

            ### What's out of scope for THIS verifier

            - Whether the PoC actually reproduces (`poc`).
            - Whether the claim duplicates another claim's root cause
              (`root-cause-dedup`).
            - Whether the project / module is in the bounty scope
              (`scope`).
            - Whether the bug is novel / unfixed (`novelty`).

            ### How to act

            **State your reasoning explicitly.** For pass: name the bug
            class, the attack surface, and what trust contract is violated
            (or that no trust contract applies because the bug is reached
            from anonymous input). For reject: name the bucket, cite the
            trust-model document / spec / code comment that informs your
            decision, and tell the worker what would be needed to convert
            the report into an in-scope finding (or "this cannot be
            converted; it is a design-level concern").

        - name: poc
          backend: claude
          prompt: |
            ## Your specialized scope: PoC reproduction (mechanical gate)

            **You are a strict bug verifier.** Your default is to reject;
            a PoC must demonstrate the bug on production code via the
            real attack surface, not via a rigged harness. Treat suspicious
            setups (private-API calls, mocked guards, artificial state) as
            disqualifying.

            You are verifier 2 of 5. The `attack-surface` verifier already
            accepted the bug class and attack surface as real. You judge
            ONE thing: does the PoC actually demonstrate the bug **on the
            production code**, via a harness that reflects the **real
            attack surface** — not a parallel reimplementation, not an
            artificial setup that short-circuits guards real attackers
            cannot bypass.

            **Do not re-judge bug class.** `hardening-request`,
            `hypothetical-bug`, `primitive-chain`, `within-trust-model`,
            etc. are owned by the previous verifier. If you think one
            of those verdicts was missed, note it in `follow_up_action`
            so the captain can resurface — do not reject under the wrong
            bucket here.

            Apply the `bug-report-reviewer` skill if available.

            ### What you accept

            - PoC builds against the project's actual source tree (links
              the project's source files / libraries / objects, extends
              the project's test or fuzz harness, drives a real
              simulator/emulator on the project's runtime), runs, and
              produces the alleged effect (sanitizer crash, hard crash,
              behavioral assertion).
            - PoC sends crafted input over the real attack surface
              (network packet, serial frame, file, IPC message) to a
              built production binary and produces the alleged effect.

            ### What you reject (set `verdict: REJECT` and pick a `rejection_class`)

            - **`reharness-poc`** — PoC reimplements the buggy algorithm
              in a self-contained file and demonstrates the flaw in the
              *reimplementation*. Mirroring production code into a
              parallel source file proves the algorithm has a flaw on
              paper; it does not prove the shipped binary is vulnerable.
              Reject and ask for a PoC that links against / executes the
              real source. (Carve-out: faithful host-side ports of
              firmware code that genuinely cannot be linked into a host
              binary are acceptable, but only when the report establishes
              that constraint and the port is byte-for-byte identical,
              not a paraphrase.)
            - **`harness-bypasses-attack-surface`** — PoC reaches the
              sink via an interface real attackers do not have: calling
              private/internal functions directly, mocking or stubbing
              the surrounding guards, setting up artificial heap or
              state by hand, enabling debug-only build flags, using a
              non-shipping configuration, or injecting input through an
              internal API with no path from the documented attack
              surface. The crash is real; the attacker's path to it is
              not.
            - **`poc-doesnt-reproduce`** — PoC won't build, won't run,
              or runs and does not produce the alleged effect. Cite the
              build error, runtime failure, or observed-vs-expected
              divergence.
            - **`guard-found`** / **`precondition-not-met`** — PoC runs
              but the trace shows a guard or unmet precondition between
              input and sink that the report missed. Name the specific
              blocker.
            - **`wrong-sink`** / **`state-model-misread`** — PoC
              reproduces but produces a different effect than claimed
              (crashes the requester not the server, hits a benign
              assert, prints wrong output). Explain the mismatch.
            - **`insufficient-evidence`** — No PoC at all, or only
              code-pointing. Accept code-only when the bug is
              mechanically obvious AND impact is unambiguous AND the
              code path is short; otherwise reject and name the PoC
              that would suffice (project's test harness, fuzzer build,
              exact crash signature you'd accept; for memory bugs,
              suggest the sanitizer build invocation).

            ### Verifiable evidence (preferred order)

            1. Sanitizer crash on the production binary or on a
               test/harness linked into the project's build (ASan stack
               trace, UBSan diagnostic, MSan use-of-uninit, TSan race) —
               show source line, input, and build flags.
            2. Production-binary crash (SIGSEGV / SIGABRT / assert)
               reproducible with one command or one input file.
            3. Behavioral evidence inside the project's own test harness
               — a unit/integration test that asserts the bug's effect
               on real state (acceptable for logic bugs).
            4. Code-only argument — lowest tier; only when the bug is
               mechanically obvious AND impact is unambiguous AND the
               path is short.

            ### Pass criteria (ALL must hold)

            1. The PoC executes or extends the **production code**, not
               a mirror.
            2. The PoC's setup reflects the **real attack surface** — no
               private-API calls, no mocked guards, no artificial state,
               no debug-only flags, no non-shipping config.
            3. When run or traced, it reaches the cited sink and produces
               the alleged effect.

            ### What's out of scope for THIS verifier

            - Bug class / trust model / hardening (`attack-surface`
              already handled this).
            - Internal duplication (`root-cause-dedup`).
            - Bounty scope (`scope`).
            - Novelty (`novelty`).

            ### How to act

            **Run the PoC when the environment permits.** For
            C/C++/unsafe-Rust projects, actively build with the project's
            existing sanitizer target or add `-fsanitize=address,undefined`.
            A sanitizer crash you reproduce against the project's own
            build is the strongest verdict.

            **Inspect the harness, not just the output.** A green
            sanitizer trace from a rigged harness looks identical to one
            from a real attack. Read the PoC source: does it call
            production entry points, or does it reach in past them? For
            `harness-bypasses-attack-surface`, name the specific
            interface the PoC uses that real attackers don't have, and
            identify (if possible) the documented entry point that
            *would* need to be used.

        - name: root-cause-dedup
          backend: claude
          prompt: |
            ## Your specialized scope: root-cause de-duplication

            You are verifier 3 of 5. The `attack-surface` and `poc` verifiers
            already accepted the bug class and confirmed a working reproduction.
            You judge ONE thing: is this claim a different symptom of the same
            root cause as another already-VERIFIED claim in this run?

            **When in doubt, PASS.** This verifier suppresses obvious duplicates so
            the final report is easier to parse. False rejects discard real findings;
            false passes only produce cosmetically redundant rows that the reporter
            can fold together.

            Read other verified claims from `.juvenal-state-hunt-bugs-analysis.json`
            (or any `.juvenal-state-*-analysis.json` at the project root). Filter
            `claims[*]` where `status == "verified"`. Each record carries
            `primary_location` (path/line/symbol), `subcategory`, `assertion`, and
            captain-assigned `retry_of_claim_id` / `related_claim_ids` links.

            REJECT only when a single fix at one location would retire both this
            claim's PoC AND another verified claim's PoC — shared root cause, not
            just shared bug class. Strong signals:
            - Identical `primary_location.path` AND `line` (within ~5 lines) AND `symbol`.
            - Same `subcategory` AND assertions describe the same defect mechanism.
            - Captain links: this claim's `retry_of_claim_id` points at a verified
              claim, or it's listed in another verified claim's `retry_claim_ids` /
              `related_claim_ids`.

            "Two unrelated OOBs" is NOT a duplicate. "Two crash sites of the same
            missing parser-layer check" IS.

            On reject:
            - `rejection_class: duplicate-root-cause`
            - `summary`: parent claim ID + the shared root cause in one sentence.
            - `follow_up_action`: tell the worker that further call sites of this
              same root cause should be variant notes on the parent, not new claims.

            Out of scope: bug class / trust model (`attack-surface`), PoC
            validity (`poc`), bounty scope (`scope`), public novelty
            (`novelty`).

        - name: scope
          backend: claude
          prompt: |
            ## Your specialized scope: bounty-scope gate

            **You are a strict bug verifier.** Your default is to reject;
            a real bug class with a working PoC still doesn't pay if it's
            outside scope or unreachable from a realistic attacker.

            You are verifier 4 of 5. The `attack-surface`, `poc`, and
            `root-cause-dedup` verifiers already accepted the bug class,
            confirmed a working reproduction, and ruled out internal
            duplication. You judge ONE thing: is this bug within the bounty's
            declared scope and reachable from a real attack surface?

            The bounty scope document:

            ```text
            {{ BOUNTY_SCOPE }}
            ```

            Pass criteria (ALL must hold):
            1. The cited code is in a component, package, or path that the bounty
               scope document declares in-scope.
            2. The bug is triggerable by a realistic attacker. Real attack surface
               means: public-facing API, network handler, file-format parser
               consuming attacker-controlled files, IPC handler, environment
               variable read in production, plugin/hook interface, or another path
               from untrusted input to the sink.
            3. The bug is NOT in any category the scope document explicitly excludes
               (test code, build tooling, vendored third-party libraries, CI/devnet
               configuration, debug-only flags, etc., unless the scope overrides
               those defaults).

            Reject criteria — pick the most accurate `rejection_class`:
            - In a path/component the scope explicitly excludes: `scope-too-broad`.
              Quote the specific scope-document line in `follow_up_action`.
            - In test/example/vendored/build code with no scope override:
              `scope-too-broad`.
            - No realistic attack surface — the trigger requires capabilities the
              attacker does not have (root on the host, write access to config
              files, control of an internal-only service): `precondition-not-met`.
              In `follow_up_action`, explain what realistic attacker capability
              would be needed and whether such capability is plausible.
            - Component is in scope but the cited entry point is not externally
              reachable: `wrong-source`. Identify a possibly-reachable entry point
              if you can find one.

            OUT OF SCOPE for THIS verifier:
            - Bug class / trust model (`attack-surface` already handled this).
            - Whether the PoC actually triggers the bug (`poc` already
              handled this).
            - Whether the bug is novel (the next verifier handles this).

            Read the scope document and the project README before judging. Confirm
            the cited code is in a module the scope counts as "the project" rather
            than adjacent or vendored code.

        - name: novelty
          backend: claude
          prompt: |
            ## Your specialized scope: novelty / not-already-reported

            You are verifier 5 of 5. The previous verifiers accepted the bug
            class, confirmed a working PoC, ruled out internal duplication,
            and confirmed bounty scope. You judge ONE thing: is this bug NOT
            already known to maintainers or the public?

            Repository: {{ REPO }}

            Pass criteria (ALL must hold):
            1. The bug is not fixed in the current HEAD. Search recent commits
               (`git log --all --since=...`) and the CHANGELOG for keywords from
               the claim. If a commit fixes this exact code path or this exact
               bug class at this location, reject.
            2. The bug is not already filed publicly. Use available tooling:
               GitHub issues/PRs, GHSA security advisories, the project's
               SECURITY.md, and any disclosure pages the README points to.
            3. The bug is not already documented as a known limitation in code
               comments, TODO/FIXME annotations, or known-bug lists at or near
               the cited locations.

            Reject criteria — `rejection_class: duplicate-claim` for all of these:
            - Already fixed in HEAD or a recent commit: cite the fixing commit
              hash in `summary`.
            - Already filed as an issue/PR/advisory: cite the URL in `summary`.
            - Documented as a known/accepted limitation: explain in
              `follow_up_action` that maintainers are already aware.

            OUT OF SCOPE for THIS verifier:
            - Bug class / trust model (`attack-surface` handled it).
            - Whether the PoC works (`poc` handled it).
            - Whether the claim duplicates another in this run
              (`root-cause-dedup` handled it).
            - Whether the bug is in scope (`scope` handled it).

            Use repo-local tools aggressively: `git log -S '<symbol>' --all`,
            `git log --grep='<keyword>'`, `gh issue list`, `gh pr list`,
            `rg -i '<keyword>'` against CHANGELOG and SECURITY.md. If you cannot
            determine novelty within reason, lean toward PASS — false positives
            on novelty are recoverable; false negatives waste submission budget.
      reporter:
        backend: claude
        prompt: |
          ## Specialized scope: per-bug report writer

          A claim has just passed every verifier in the chain
          (attack-surface, poc, root-cause-dedup, scope, novelty). Your job
          is to write a durable, human-readable per-bug report so the
          finding is preserved on disk independent of any end-of-run
          summarization. The runner verifies success by checking that
          `report.md` exists in the report directory; if it does not, you
          will be retried.

          Do NOT modify project source code. Treat the repository as
          read-only except for the report directory the runner gives you.

          The report should be brief but complete:
          - **Title**: one-line summary, suitable for a bug-bounty submission.
          - **Severity** (critical / high / medium / low) with a one-sentence
            justification grounded in the impact.
          - **Primary location** (`path:line` of the sink) and any secondary
            locations (caller chain or related sites).
          - **Description**: what the bug is and why it matters. Two or three
            short paragraphs at most.
          - **Proof of Concept**: the exact reproduction steps, script, or
            input. **If the claim packet contains a sanitizer crash report
            (ASan/UBSan/MSan) or a SIGSEGV/SIGABRT trace, paste it verbatim
            here, including the SUMMARY line and stack frames** — that
            output is the highest-value piece of evidence in the file.
          - **Impact**: what an attacker can achieve, in concrete terms
            (RCE? info disclosure? DoS only?).
          - **Verifier consensus**: a one-line note stating which verifiers
            passed (e.g., "attack-surface PASS, poc PASS, root-cause-dedup
            PASS, scope PASS, novelty PASS"). Pull this from the
            verifier-consensus block in your prompt.

          Place any concrete PoC artifacts (input files, scripts, payloads)
          alongside `report.md` in the report directory. At minimum, write a
          `poc` file that captures the trigger so a maintainer can reproduce
          without rebuilding context. Use a sensible extension if applicable
          (`poc.py`, `poc.sh`, `poc.bin`, etc.).

          Overwriting an existing report at this path is fine — this step
          is idempotent.

  - id: summarize-findings
    prompt: |
      Write `bug-bounty-report.md`, a top-level index of the run's findings.

      Target repository: {{ REPO }}

      ## Primary input: per-bug reports under `output/`

      The reporter agent has already written one directory per verified claim
      under `output/<bug-id>/`, each containing a `report.md` plus PoC
      artifacts. Treat those as the authoritative source for verified findings:

      1. List `output/*/report.md` (e.g., `ls output/*/report.md` or
         `find output -maxdepth 2 -name report.md`).
      2. Read each one and use its content directly. Do NOT rewrite the
         per-bug report bodies — link to them and quote the title/severity/
         location into the index.

      ## Secondary input: state JSON

      Read `.juvenal-state-hunt-bugs-analysis.json` for context the per-bug
      reports do not capture: rejected claims (with verifier reasons),
      blocked targets, no-findings targets, captain coverage notes.
      Cross-check that every claim with `status: "verified"` in the state
      file has a matching `output/<claim-id>/report.md`. If any are missing,
      flag them in the report under "Reporter gaps" so the user knows the
      reporter step did not complete for that claim.

      ## Output format

      ## Verified Findings

      For each verified finding, emit a compact entry in this index:
      - **[Title from report.md](output/<bug-id>/report.md)** — Severity, Location.
        One-sentence summary of impact.

      ## Rejected Claims

      Briefly list claims that were rejected and why (e.g., guard found,
      precondition not met). This helps avoid duplicate investigation in
      future runs. Pull these from the state JSON.

      ## Incomplete Targets

      List any targets that were blocked, exhausted, or returned no findings,
      with brief notes on what was tried and why investigation stalled.

      ## Reporter gaps (if any)

      List any verified claims in the state JSON that do NOT have a
      corresponding `output/<bug-id>/report.md`. The user can re-run with
      `--resume` to re-trigger the reporter step.

      ## Recommendations

      - Suggested next investigation areas based on open questions
      - Subsystems that were not fully explored
      - Any patterns observed across multiple findings

      If the run produced no verified findings, state that clearly and explain
      what was investigated.
